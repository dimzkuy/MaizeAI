# Konfigurasi Cloud Build untuk build dan deploy aplikasi ke Cloud Run
steps:
  - name: "gcr.io/cloud-builders/docker"
    args:
      [
        "build",
        "-t",
        "asia-southeast2-docker.pkg.dev/$PROJECT_ID/maizeai-repo/maizeai-backend",
        "./backend",
      ]
  # Push image ke Artifact Registry
  - name: "gcr.io/cloud-builders/docker"
    args:
      [
        "push",
        "asia-southeast2-docker.pkg.dev/$PROJECT_ID/maizeai-repo/maizeai-backend",
      ]
  # Deploy ke Cloud Run
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: gcloud
    args:
      [
        "run",
        "deploy",
        "maizeai-backend",
        "--image",
        "asia-southeast2-docker.pkg.dev/$PROJECT_ID/maizeai-repo/maizeai-backend",
        "--region",
        "asia-southeast2",
        "--platform",
        "managed",
        "--allow-unauthenticated",
        "--set-env-vars",
        "GCS_BUCKET_NAME=$_GCS_BUCKET_NAME,GCS_MODEL_BLOB=$_GCS_MODEL_BLOB",
      ]

options:
  logging: CLOUD_LOGGING_ONLY
