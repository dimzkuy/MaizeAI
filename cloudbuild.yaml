# Konfigurasi Cloud Build untuk membangun dan mendorong image Docker, lalu menerapkan ke Cloud Run
steps:
  - name: "gcr.io/cloud-builders/docker"
    args: ["build", "-t", "gcr.io/$PROJECT_ID/maizeai-app", "."]

  # Push image ke Container Registry
  - name: "gcr.io/cloud-builders/docker"
    args: ["push", "gcr.io/$PROJECT_ID/maizeai-app"]

  # Deploy ke Cloud Run
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: gcloud
    args:
      [
        "run",
        "deploy",
        "maizeai-app",
        "--image",
        "gcr.io/$PROJECT_ID/maizeai-app",
        "--region",
        "asia-southeast2",
        "--platform",
        "managed",
        "--allow-unauthenticated",
        "--memory",
        "1Gi",
        "--timeout",
        "300",
      ]
